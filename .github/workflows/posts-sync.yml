name: Posts Sync

on:
  schedule:
    - cron: '30 18 * * *'   # 03:30 KST (UTC+9)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ${{ vars.VAULT_REPO }}
          token: ${{ secrets.VAULT_PAT }}
          path: __vault

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet python-frontmatter

      - name: Run posts_sync
        run: python scripts/posts_sync.py --vault-dir __vault/999.Public/posts

      - name: Commit if changed
        run: |
          git config user.name 'vault-sync-bot'
          git config user.email 'bot@gyuminlee.dev'
          git add src/content/posts public/images/posts
          if git --no-pager diff --staged --quiet; then
            echo "no changes"
          else
            git commit --quiet -m "chore: posts sync $(date -u +%Y-%m-%d)"
            git push --quiet
          fi
