name: Scholar Sync

# Daily schedule moved to the always-on Mac (scripts/scholar_sync_cron.sh via
# launchd) because Google Scholar bot-blocks GitHub's datacenter IPs. Kept here
# for manual/backup runs only.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install scholarly
        run: pip install --quiet scholarly

      - name: Run sync
        env:
          SCHOLAR_ID: ${{ vars.SCHOLAR_ID || 'cnTN6OkAAAAJ' }}
        run: python scripts/scholar_sync.py

      - name: Commit if changed
        run: |
          git config user.name 'scholar-sync-bot'
          git config user.email 'bot@gyuminlee.dev'
          git add src/data/publications.json src/data/scholar_metrics.json
          if ! git --no-pager diff --staged --quiet; then
            git commit --quiet -m "chore: scholar sync $(date -u +%Y-%m-%d)"
            git push --quiet
          else
            echo "no changes"
          fi
